version: 2.1

orbs:
  php: circleci/php@1.1.0

jobs:
  test:
    docker:
      - image: cimg/php:8.3
      - image: cimg/mysql:8.0
        environment:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: wordpress_test
          MYSQL_USER: wp_test
          MYSQL_PASSWORD: wp_test_ci
    environment:
      WP_TESTS_DIR: /tmp/wordpress-tests-lib
    steps:
      - checkout
      - php/install-composer
      - run:
          name: Install dependencies
          command: composer install --no-interaction --prefer-dist
      - run:
          name: Wait for MySQL
          command: |
            for i in $(seq 1 30); do
              mysql -h 127.0.0.1 -u root -proot -e "SELECT 1" 2>/dev/null && break
              sleep 2
            done
      - run:
          name: Install WP test suite
          command: |
            sudo apt-get install -y subversion 2>/dev/null || true
            bash bin/install-wp-tests.sh wordpress_test wp_test wp_test_ci 127.0.0.1 latest
      - run:
          name: Run PHPCS
          command: ~/.config/composer/vendor/bin/phpcs
      - run:
          name: Run PHPStan
          command: ~/.config/composer/vendor/bin/phpstan analyse --level=5 --no-progress .
      - run:
          name: Run PHPUnit
          command: |
            export WP_TESTS_DIR=/tmp/wordpress-tests-lib
            ./vendor/bin/phpunit

workflows:
  main:
    jobs:
      - test
